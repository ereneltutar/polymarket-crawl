name: Daily Polymarket Scan

on:
  schedule:
    # 03:00 UTC = 06:00 Turkiye saati (UTC+3). Degistirmek icin bu satiri duzenle.
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # Actions sekmesinden manuel calistirmak icin

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu checkout et
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimliliklari yukle
        run: pip install requests

      - name: Taramayi calistir
        run: python scripts/fetch_arbitrage.py

      - name: Sonuclari commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json docs/price_log.jsonl
          if git diff --staged --quiet; then
            echo "Degisiklik yok, commit atlanıyor."
          else
            git commit -m "Daily scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
